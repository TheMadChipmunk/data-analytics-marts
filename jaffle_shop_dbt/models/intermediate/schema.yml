version: 2

models:
  - name: int_orders_with_payments
    description: >
      Orders enriched with payment totals. One row per order.
      Joins stg_orders and stg_payments, aggregating payments to order level.
    columns:
      - name: order_id
        description: 'Unique order identifier (PK from stg_orders)'
      - name: customer_id
        description: 'Customer identifier (FK to stg_customers)'
      - name: order_date
        description: 'Date the order was placed'
      - name: status
        description: 'Order fulfillment status'
      - name: payment_count
        description: 'Number of payments for this order (some orders split across methods)'
      - name: total_amount
        description: 'Total amount paid for this order in dollars (SUM of stg_payments.amount)'
